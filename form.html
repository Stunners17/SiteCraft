<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Get Your Website | SiteCraft </title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="stylesheet" href="style.css">

    </head>

    <body>

    <div class="form-container">
      <h2>Request a Website</h2>
      <p class="subtitle">Tell us about your business and we’ll contact you shortly with a tailored proposal.</p>

      <form
        id="website-request-form"
        action="https://formspree.io/f/xgolwqyg"
        method="POST"
      >
        <input type="hidden" name="_subject" value="New Website Request - SiteCraft">
        <input type="text" name="_gotcha" style="display:none">

        <label for="business-name">Business Name</label>
        <input id="business-name" type="text" name="business name" placeholder="Business name" required>

        <label for="owner-names">Owner Names</label>
        <input id="owner-names" type="text" name="owner names" placeholder="Owner names" required>

        <label for="email">Email Address</label>
        <input id="email" type="email" name="email" placeholder="name@email.com" required>

        <label for="phone">Phone / WhatsApp Number</label>
        <input id="phone" type="tel" name="phone" placeholder="e.g. 071 234 5678" required>

        <label for="package">Select Package</label>
        <select id="package" name="package" required>
          <option value="">-- Choose a package --</option>
          <option value="Basic">Basic</option>
          <option value="Standard">Standard</option>
          <option value="Premium">Premium</option>
        </select>

        <label for="business-details">Tell us about your business</label>
        <textarea
          id="business-details"
          name="business details"
          rows="5"
          placeholder="What do you sell? Do you want orders, delivery, or just information?"
        ></textarea>

        <button type="submit" class="button button-primary">Submit Request</button>
      </form>

      <p class="note">We’ll contact you after reviewing your request.</p>
    </div>


  <!-- Auto-select package from previous page -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const selectedPackage = params.get("package");

    if (selectedPackage) {
      document.getElementById("package").value =
        selectedPackage.charAt(0).toUpperCase() + selectedPackage.slice(1);
    }
  </script>

    </body>
</html>
